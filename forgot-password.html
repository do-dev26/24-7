<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — SaleIQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/tailwind.css">
  <style>body{font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f7f7f8;padding:24px;}</style>
</head>
<body>
<div style="width:100%;max-width:380px;" class="animate-in">
  <div style="text-align:center;margin-bottom:28px;">
    <a href="index.html" style="display:inline-flex;align-items:center;gap:8px;text-decoration:none;margin-bottom:24px;">
      <div style="width:32px;height:32px;border-radius:8px;background:#10a37f;display:flex;align-items:center;justify-content:center;">
        <svg width="15" height="15" fill="white" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
      </div>
      <span style="font-size:17px;font-weight:600;color:#0d0d0d;">SaleIQ</span>
    </a>
    <div style="width:52px;height:52px;border-radius:50%;background:#f0faf7;border:1px solid #d1fae5;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
      <svg width="22" height="22" fill="none" stroke="#10a37f" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <h1 style="font-size:22px;font-weight:700;letter-spacing:-0.02em;margin-bottom:6px;">Reset your password</h1>
    <p style="font-size:14px;color:#6b6b6b;line-height:1.6;">Enter your email and we'll send you a reset link.</p>
  </div>

  <div style="background:#fff;border:1px solid #e5e5e6;border-radius:16px;padding:28px;box-shadow:0 4px 24px rgba(0,0,0,0.06);">
    <form onsubmit="handleForgotPassword(event)">
      <div style="display:flex;flex-direction:column;gap:16px;">
        <div class="form-group">
          <label class="form-label">Email address</label>
          <input type="email" id="email" class="form-input" placeholder="you@company.com" required>
        </div>
        <button type="submit" style="width:100%;background:#0d0d0d;color:#fff;padding:11px;border-radius:9px;font-size:14px;font-weight:500;border:none;cursor:pointer;font-family:inherit;" onmouseover="this.style.background='#1a1a1a'" onmouseout="this.style.background='#0d0d0d'">
          Send reset link
        </button>
      </div>
    </form>
  </div>

  <div style="text-align:center;margin-top:20px;">
    <a href="login.html" style="font-size:14px;color:#6b6b6b;text-decoration:none;display:inline-flex;align-items:center;gap:5px;">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Back to login
    </a>
  </div>
</div>

<div class="toast-container"></div>
<script>
function showToast(m,t='success'){let c=document.querySelector('.toast-container');if(!c){c=document.createElement('div');c.className='toast-container';document.body.appendChild(c);}const d=document.createElement('div');const colors={'success':'#0d0d0d','error':'#dc2626','info':'#2563eb'};d.style.cssText=`background:${colors[t]||'#0d0d0d'};color:#fff;padding:12px 18px;border-radius:9px;font-size:13px;font-family:inherit;box-shadow:0 4px 16px rgba(0,0,0,0.15);min-width:220px;`;d.textContent=m;c.appendChild(d);setTimeout(()=>{d.style.opacity='0';d.style.transition='opacity 0.3s';setTimeout(()=>d.remove(),300)},3000);}
function handleForgotPassword(e){e.preventDefault();const email=document.getElementById('email')?.value.trim();if(!email)return showToast('Please enter your email.','error');showToast('Reset link sent to '+email,'success');setTimeout(()=>window.location.href='login.html',2000);}
</script>
</body>
</html>
