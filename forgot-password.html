<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — SaleIQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/tailwind.css">
  <style>
    body{font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f7f7f8;padding:24px;}
    .inp{width:100%;background:#fff;border:1px solid #e5e5e6;border-radius:8px;padding:10px 13px;font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border-color 0.15s,box-shadow 0.15s;}
    .inp:focus{border-color:#10a37f;box-shadow:0 0 0 3px rgba(16,163,127,0.1);}
    .toast-container{position:fixed;bottom:20px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:8px;}
  </style>
</head>
<body>
<div style="width:100%;max-width:380px;">
  <div style="text-align:center;margin-bottom:28px;">
    <a href="index.html" style="display:inline-flex;align-items:center;gap:8px;text-decoration:none;margin-bottom:22px;">
      <div style="width:30px;height:30px;border-radius:8px;background:#10a37f;display:flex;align-items:center;justify-content:center;"><svg width="14" height="14" fill="white" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></div>
      <span style="font-size:16px;font-weight:600;color:#0d0d0d;">SaleIQ</span>
    </a>
    <div style="width:48px;height:48px;border-radius:50%;background:#f0faf7;border:1px solid #d1fae5;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;">
      <svg width="20" height="20" fill="none" stroke="#10a37f" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <h1 style="font-size:20px;font-weight:700;letter-spacing:-0.02em;margin-bottom:6px;">Reset your password</h1>
    <p style="font-size:14px;color:#6b6b6b;line-height:1.6;">Enter your email and we'll send a reset link via Firebase.</p>
  </div>

  <div style="background:#fff;border:1px solid #e5e5e6;border-radius:14px;padding:26px;box-shadow:0 2px 12px rgba(0,0,0,0.06);">
    <form onsubmit="handleForgotPassword(event)">
      <div style="margin-bottom:16px;">
        <label style="font-size:12px;font-weight:500;color:#6b6b6b;display:block;margin-bottom:5px;">Email address</label>
        <input type="email" id="email" class="inp" placeholder="you@company.com" required>
      </div>
      <button type="submit" style="width:100%;background:#0d0d0d;color:#fff;padding:11px;border-radius:8px;font-size:14px;font-weight:500;border:none;cursor:pointer;font-family:'Inter',sans-serif;" onmouseover="this.style.background='#1a1a1a'" onmouseout="this.style.background='#0d0d0d'">
        Send reset link
      </button>
    </form>
  </div>

  <div style="text-align:center;margin-top:18px;">
    <a href="login.html" style="font-size:14px;color:#6b6b6b;text-decoration:none;display:inline-flex;align-items:center;gap:5px;">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>Back to login
    </a>
  </div>
</div>

<div class="toast-container"></div>
<script type="module" src="assets/js/auth.js"></script>
</body>
</html>
