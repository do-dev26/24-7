<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — SaleIQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/tailwind.css">
  <style>
    body { font-family:'Inter',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; background:#f7f7f8; padding:24px; }
    .auth-wrap { width:100%; max-width:400px; }
    .auth-card { background:#fff; border:1px solid #e5e5e6; border-radius:16px; padding:32px; box-shadow:0 4px 24px rgba(0,0,0,0.06); }
  </style>
</head>
<body>
<div class="auth-wrap animate-in">
  <!-- Logo -->
  <div style="text-align:center;margin-bottom:28px;">
    <a href="index.html" style="display:inline-flex;align-items:center;gap:8px;text-decoration:none;margin-bottom:20px;">
      <div style="width:32px;height:32px;border-radius:8px;background:#10a37f;display:flex;align-items:center;justify-content:center;">
        <svg width="15" height="15" fill="white" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
      </div>
      <span style="font-size:17px;font-weight:600;color:#0d0d0d;">SaleIQ</span>
    </a>
    <h1 style="font-size:22px;font-weight:700;letter-spacing:-0.02em;margin-bottom:5px;">Welcome back</h1>
    <p style="font-size:14px;color:#6b6b6b;">Sign in to your account</p>
  </div>

  <div class="auth-card">
    <form id="login-form" onsubmit="handleLogin(event)">
      <div style="display:flex;flex-direction:column;gap:16px;">
        <div class="form-group">
          <label class="form-label">Email address</label>
          <input type="email" id="email" class="form-input" placeholder="you@company.com" required>
        </div>
        <div class="form-group">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
            <label class="form-label" style="margin:0;">Password</label>
            <a href="forgot-password.html" style="font-size:13px;color:#10a37f;text-decoration:none;">Forgot password?</a>
          </div>
          <div style="position:relative;">
            <input type="password" id="password" class="form-input" placeholder="••••••••" required style="padding-right:42px;">
            <button type="button" onclick="togglePassword('password',this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#ababab;padding:2px;">
              <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <input type="checkbox" id="remember" style="accent-color:#10a37f;width:15px;height:15px;cursor:pointer;">
          <label for="remember" style="font-size:13px;color:#6b6b6b;cursor:pointer;">Remember me for 30 days</label>
        </div>
        <button type="submit" style="width:100%;background:#0d0d0d;color:#fff;padding:11px;border-radius:9px;font-size:14px;font-weight:500;border:none;cursor:pointer;font-family:inherit;transition:background 0.15s;" onmouseover="this.style.background='#1a1a1a'" onmouseout="this.style.background='#0d0d0d'">
          Sign in
        </button>
      </div>
    </form>

    <div class="divider" style="margin:20px 0;"><span></span><p>or</p><span></span></div>

    <button onclick="showToast('Google login coming soon','info')" style="width:100%;background:#fff;border:1px solid #e5e5e6;border-radius:9px;padding:10px;display:flex;align-items:center;justify-content:center;gap:9px;font-size:14px;font-weight:500;color:#374151;cursor:pointer;font-family:inherit;transition:background 0.12s;" onmouseover="this.style.background='#f7f7f8'" onmouseout="this.style.background='#fff'">
      <svg width="17" height="17" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
  </div>

  <p style="text-align:center;margin-top:20px;font-size:14px;color:#6b6b6b;">
    Don't have an account? <a href="signup.html" style="color:#10a37f;text-decoration:none;font-weight:500;">Sign up free</a>
  </p>
</div>

<div class="toast-container"></div>
<script>
function showToast(m,t='success'){let c=document.querySelector('.toast-container');if(!c){c=document.createElement('div');c.className='toast-container';document.body.appendChild(c);}const d=document.createElement('div');d.className='toast '+(t||'');const colors={'success':'#0d0d0d','error':'#dc2626','info':'#2563eb','warning':'#d97706'};d.style.background=colors[t]||'#0d0d0d';d.innerHTML=`<span style="color:#fff;font-size:13px;">${m}</span>`;c.appendChild(d);setTimeout(()=>{d.style.opacity='0';d.style.transition='opacity 0.3s';setTimeout(()=>d.remove(),300)},3000);}
function handleLogin(e){e.preventDefault();const email=document.getElementById('email')?.value.trim();const password=document.getElementById('password')?.value;if(!email||!password)return showToast('Please fill in all fields.','error');const userData={uid:'uid_demo',name:email.split('@')[0].replace(/[._]/g,' ').replace(/\b\w/g,c=>c.toUpperCase()),email,plan:'Pro',wordsUsed:3420,wordsLimit:10000,planExpiry:new Date(Date.now()+18*86400000).toISOString(),createdAt:new Date().toISOString()};localStorage.setItem('saleiq_user',JSON.stringify(userData));showToast('Welcome back!','success');const params=new URLSearchParams(window.location.search);setTimeout(()=>window.location.href=params.get('redirect')||'dashboard.html',1000);}
function togglePassword(id,btn){const inp=document.getElementById(id);if(!inp)return;inp.type=inp.type==='password'?'text':'password';btn.style.color=inp.type==='text'?'#10a37f':'#ababab';}
function redirectIfLoggedIn(){if(localStorage.getItem('saleiq_user'))window.location.href='dashboard.html';}
redirectIfLoggedIn();
</script>
</body>
</html>
