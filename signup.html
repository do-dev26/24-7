<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — SaleIQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/tailwind.css">
  <style>
    body{font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f7f7f8;padding:24px;}
    .inp{width:100%;background:#fff;border:1px solid #e5e5e6;border-radius:8px;padding:10px 13px;font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border-color 0.15s,box-shadow 0.15s;color:#0d0d0d;}
    .inp:focus{border-color:#10a37f;box-shadow:0 0 0 3px rgba(16,163,127,0.1);}
    .inp::placeholder{color:#c0c0c0;}
    .strength-bar{height:3px;flex:1;border-radius:99px;transition:background 0.25s;background:#e5e5e6;}
    .toast-container{position:fixed;bottom:20px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:8px;}
  </style>
</head>
<body>
<div style="width:100%;max-width:420px;">
  <div style="text-align:center;margin-bottom:28px;">
    <a href="index.html" style="display:inline-flex;align-items:center;gap:8px;text-decoration:none;margin-bottom:20px;">
      <div style="width:30px;height:30px;border-radius:8px;background:#10a37f;display:flex;align-items:center;justify-content:center;"><svg width="14" height="14" fill="white" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></div>
      <span style="font-size:16px;font-weight:600;color:#0d0d0d;">SaleIQ</span>
    </a>
    <h1 style="font-size:22px;font-weight:700;letter-spacing:-0.02em;margin-bottom:5px;">Create your account</h1>
    <p style="font-size:14px;color:#6b6b6b;">7-day free trial · No credit card required</p>
  </div>

  <div style="background:#fff;border:1px solid #e5e5e6;border-radius:14px;padding:28px;box-shadow:0 2px 12px rgba(0,0,0,0.06);">
    <form onsubmit="handleSignUp(event)">
      <div style="display:flex;flex-direction:column;gap:14px;">
        <div>
          <label style="font-size:12px;font-weight:500;color:#6b6b6b;display:block;margin-bottom:5px;">Full name</label>
          <input type="text" id="name" class="inp" placeholder="John Smith" required>
        </div>
        <div>
          <label style="font-size:12px;font-weight:500;color:#6b6b6b;display:block;margin-bottom:5px;">Work email</label>
          <input type="email" id="email" class="inp" placeholder="you@company.com" required>
        </div>
        <div>
          <label style="font-size:12px;font-weight:500;color:#6b6b6b;display:block;margin-bottom:5px;">Password</label>
          <div style="position:relative;">
            <input type="password" id="password" class="inp" placeholder="Min. 6 characters" required oninput="checkStrength(this.value)" style="padding-right:42px;">
            <button type="button" onclick="togglePassword('password',this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#ababab;padding:2px;">
              <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div style="display:flex;gap:3px;margin-top:6px;">
            <div class="strength-bar" id="s1"></div><div class="strength-bar" id="s2"></div>
            <div class="strength-bar" id="s3"></div><div class="strength-bar" id="s4"></div>
          </div>
          <p id="strength-label" style="font-size:11px;color:#ababab;margin-top:4px;"></p>
        </div>
        <div>
          <label style="font-size:12px;font-weight:500;color:#6b6b6b;display:block;margin-bottom:5px;">Confirm password</label>
          <input type="password" id="confirm-password" class="inp" placeholder="••••••••" required>
        </div>
        <div style="display:flex;align-items:flex-start;gap:9px;">
          <input type="checkbox" id="terms" required style="accent-color:#10a37f;width:15px;height:15px;margin-top:2px;flex-shrink:0;cursor:pointer;">
          <label for="terms" style="font-size:13px;color:#6b6b6b;cursor:pointer;line-height:1.5;">
            I agree to the <a href="term-condition.html" style="color:#10a37f;text-decoration:none;">Terms of Service</a> and <a href="privacy.html" style="color:#10a37f;text-decoration:none;">Privacy Policy</a>
          </label>
        </div>
        <button type="submit" style="width:100%;background:#0d0d0d;color:#fff;padding:11px;border-radius:8px;font-size:14px;font-weight:500;border:none;cursor:pointer;font-family:'Inter',sans-serif;transition:background 0.15s;" onmouseover="this.style.background='#1a1a1a'" onmouseout="this.style.background='#0d0d0d'">
          Create account
        </button>
        <div style="display:flex;align-items:center;justify-content:center;gap:18px;">
          <span style="font-size:12px;color:#ababab;display:flex;align-items:center;gap:4px;"><svg width="11" height="11" fill="#10a37f" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>Secure</span>
          <span style="font-size:12px;color:#ababab;display:flex;align-items:center;gap:4px;"><svg width="11" height="11" fill="#10a37f" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>No credit card</span>
          <span style="font-size:12px;color:#ababab;display:flex;align-items:center;gap:4px;"><svg width="11" height="11" fill="#10a37f" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>7-day trial</span>
        </div>
      </div>
    </form>
  </div>

  <p style="text-align:center;margin-top:18px;font-size:14px;color:#6b6b6b;">
    Already have an account? <a href="login.html" style="color:#10a37f;text-decoration:none;font-weight:500;">Log in</a>
  </p>
</div>

<div class="toast-container"></div>

<!-- Firebase Auth -->
<script type="module" src="assets/js/auth.js"></script>
<script type="module">
  import { auth } from './assets/js/firebase-config.js';
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
  onAuthStateChanged(auth, (user) => { if (user) window.location.href = 'dashboard.html'; });
</script>
</body>
</html>
