<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — SaleIQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/tailwind.css">
  <style>
    body { font-family:'Inter',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; background:#f7f7f8; padding:24px; }
    .auth-card { background:#fff; border:1px solid #e5e5e6; border-radius:16px; padding:32px; box-shadow:0 4px 24px rgba(0,0,0,0.06); width:100%; max-width:420px; }
    .strength-bar { height:3px; flex:1; border-radius:99px; transition:background 0.25s; background:#e5e5e6; }
  </style>
</head>
<body>
<div style="width:100%;max-width:420px;" class="animate-in">
  <div style="text-align:center;margin-bottom:28px;">
    <a href="index.html" style="display:inline-flex;align-items:center;gap:8px;text-decoration:none;margin-bottom:20px;">
      <div style="width:32px;height:32px;border-radius:8px;background:#10a37f;display:flex;align-items:center;justify-content:center;">
        <svg width="15" height="15" fill="white" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
      </div>
      <span style="font-size:17px;font-weight:600;color:#0d0d0d;">SaleIQ</span>
    </a>
    <h1 style="font-size:22px;font-weight:700;letter-spacing:-0.02em;margin-bottom:5px;">Create your account</h1>
    <p style="font-size:14px;color:#6b6b6b;">7-day free trial · No credit card required</p>
  </div>

  <div class="auth-card">
    <form onsubmit="handleSignUp(event)">
      <div style="display:flex;flex-direction:column;gap:15px;">
        <div class="form-group">
          <label class="form-label">Full name</label>
          <input type="text" id="name" class="form-input" placeholder="John Smith" required>
        </div>
        <div class="form-group">
          <label class="form-label">Work email</label>
          <input type="email" id="email" class="form-input" placeholder="you@company.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div style="position:relative;">
            <input type="password" id="password" class="form-input" placeholder="Min. 8 characters" required oninput="checkStrength(this.value)" style="padding-right:42px;">
            <button type="button" onclick="togglePassword('password',this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#ababab;padding:2px;">
              <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div style="display:flex;gap:3px;margin-top:6px;">
            <div class="strength-bar" id="s1"></div>
            <div class="strength-bar" id="s2"></div>
            <div class="strength-bar" id="s3"></div>
            <div class="strength-bar" id="s4"></div>
          </div>
          <p id="strength-label" style="font-size:11px;color:#ababab;margin-top:4px;"></p>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm password</label>
          <input type="password" id="confirm-password" class="form-input" placeholder="••••••••" required>
        </div>
        <div style="display:flex;align-items:flex-start;gap:9px;">
          <input type="checkbox" id="terms" required style="accent-color:#10a37f;width:15px;height:15px;margin-top:2px;flex-shrink:0;cursor:pointer;">
          <label for="terms" style="font-size:13px;color:#6b6b6b;cursor:pointer;line-height:1.5;">
            I agree to the <a href="term-condition.html" style="color:#10a37f;text-decoration:none;">Terms of Service</a> and <a href="privacy.html" style="color:#10a37f;text-decoration:none;">Privacy Policy</a>
          </label>
        </div>
        <button type="submit" style="width:100%;background:#0d0d0d;color:#fff;padding:11px;border-radius:9px;font-size:14px;font-weight:500;border:none;cursor:pointer;font-family:inherit;transition:background 0.15s;" onmouseover="this.style.background='#1a1a1a'" onmouseout="this.style.background='#0d0d0d'">
          Create account
        </button>
        <!-- Trust -->
        <div style="display:flex;align-items:center;justify-content:center;gap:20px;">
          <span style="font-size:12px;color:#ababab;display:flex;align-items:center;gap:4px;">
            <svg width="11" height="11" fill="#10a37f" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>Secure
          </span>
          <span style="font-size:12px;color:#ababab;display:flex;align-items:center;gap:4px;">
            <svg width="11" height="11" fill="#10a37f" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>No credit card
          </span>
          <span style="font-size:12px;color:#ababab;display:flex;align-items:center;gap:4px;">
            <svg width="11" height="11" fill="#10a37f" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>7-day trial
          </span>
        </div>
      </div>
    </form>
  </div>

  <p style="text-align:center;margin-top:20px;font-size:14px;color:#6b6b6b;">
    Already have an account? <a href="login.html" style="color:#10a37f;text-decoration:none;font-weight:500;">Log in</a>
  </p>
</div>

<div class="toast-container"></div>
<script>
function showToast(m,t='success'){let c=document.querySelector('.toast-container');if(!c){c=document.createElement('div');c.className='toast-container';document.body.appendChild(c);}const d=document.createElement('div');d.className='toast';const colors={'success':'#0d0d0d','error':'#dc2626','info':'#2563eb','warning':'#d97706'};d.style.cssText=`background:${colors[t]||'#0d0d0d'};color:#fff;padding:12px 18px;border-radius:9px;font-size:13px;font-family:inherit;box-shadow:0 4px 16px rgba(0,0,0,0.15);min-width:220px;`;d.textContent=m;c.appendChild(d);setTimeout(()=>{d.style.opacity='0';d.style.transition='opacity 0.3s';setTimeout(()=>d.remove(),300)},3000);}
function handleSignUp(e){e.preventDefault();const name=document.getElementById('name')?.value.trim();const email=document.getElementById('email')?.value.trim();const password=document.getElementById('password')?.value;const confirm=document.getElementById('confirm-password')?.value;if(!name||!email||!password)return showToast('Please fill in all fields.','error');if(password.length<8)return showToast('Password must be at least 8 characters.','error');if(password!==confirm)return showToast('Passwords do not match.','error');const userData={uid:'uid_'+Date.now(),name,email,plan:'Basic',wordsUsed:0,wordsLimit:5000,planExpiry:new Date(Date.now()+30*86400000).toISOString(),createdAt:new Date().toISOString()};localStorage.setItem('saleiq_user',JSON.stringify(userData));showToast('Account created! Redirecting...','success');setTimeout(()=>window.location.href='dashboard.html',1200);}
function togglePassword(id,btn){const inp=document.getElementById(id);if(!inp)return;inp.type=inp.type==='password'?'text':'password';btn.style.color=inp.type==='text'?'#10a37f':'#ababab';}
function checkStrength(val){const bars=[1,2,3,4].map(i=>document.getElementById('s'+i));const label=document.getElementById('strength-label');bars.forEach(b=>{if(b)b.style.background='#e5e5e6';});if(!val){if(label)label.textContent='';return;}let score=0;if(val.length>=8)score++;if(/[A-Z]/.test(val))score++;if(/[0-9]/.test(val))score++;if(/[^A-Za-z0-9]/.test(val))score++;const colors=['#ef4444','#f59e0b','#10a37f','#059669'];const labels=['Weak','Fair','Good','Strong'];for(let i=0;i<score;i++){if(bars[i])bars[i].style.background=colors[score-1];}if(label){label.textContent=labels[score-1]||'';label.style.color=colors[score-1]||'#ababab';}}
function redirectIfLoggedIn(){if(localStorage.getItem('saleiq_user'))window.location.href='dashboard.html';}
redirectIfLoggedIn();
</script>
</body>
</html>
